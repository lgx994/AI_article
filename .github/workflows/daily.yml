name: Daily Elite Markdown Push

on:
  schedule:
    - cron: '30 13 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Read and increment day counter
        id: counter
        run: |
          if [ ! -f state.json ]; then
            echo '{"day":0}' > state.json
          fi

          DAY=$(jq -r '.day' state.json)
          NEW_DAY=$((DAY + 1))

          echo "{\"day\":$NEW_DAY}" > state.json

          echo "day=$NEW_DAY" >> $GITHUB_OUTPUT

      - name: Commit updated day
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add state.json

          git commit -m "Day ${{ steps.counter.outputs.day }}" || true
          git push || true

      - name: Extract yesterday's forecast
        id: forecast
        run: |
          if [ -f report.md ]; then
            FORECAST=$(awk '/^## 明日预告/{flag=1; next} /^## /{flag=0} flag' report.md | head -n 3 | tr '\n' ' ')
            echo "forecast=$FORECAST" >> $GITHUB_OUTPUT
          else
            echo "forecast=" >> $GITHUB_OUTPUT
          fi

      - name: Read today's topic from schedule
        id: schedule
        run: |
          DAY=${{ steps.counter.outputs.day }}

          if [ ! -f schedule.json ]; then
            echo "Error: schedule.json not found"
            exit 1
          fi

          TOPIC=$(jq -r ".\"$DAY\".topic" schedule.json)
          SUBTOPIC=$(jq -r ".\"$DAY\".subtopic" schedule.json)
          BRIDGE=$(jq -r ".\"$DAY\".bridge // empty" schedule.json)

          echo "topic=$TOPIC" >> $GITHUB_OUTPUT
          echo "subtopic=$SUBTOPIC" >> $GITHUB_OUTPUT
          echo "bridge=$BRIDGE" >> $GITHUB_OUTPUT

      - name: Randomize other variables
        id: vars
        run: |
          ARTICLE_TYPES=("叙事主导型" "模型主导型" "观察笔记型" "书信/对话型" "场景切片型" "问答/假想对话型")
          TONES=("学长型" "观察者型" "同行者型" "反思者型" "讲述者型")
          OPENINGS=("场景开场" "疑问开场" "引用开场" "自我暴露开场" "反常识开场" "留白开场")
          ENDINGS=("开放式问题" "行动微调" "留白" "与开头呼应" "未来预告（柔和）")
          VARIANTS=("标准结构" "精简结构" "极简结构")
          FIRST_PERSON=("标准" "高" "低")

          rand_idx=$(( RANDOM % ${#ARTICLE_TYPES[@]} ))
          ARTICLE_TYPE=${ARTICLE_TYPES[$rand_idx]}

          rand_idx=$(( RANDOM % ${#TONES[@]} ))
          TONE=${TONES[$rand_idx]}

          rand_idx=$(( RANDOM % ${#OPENINGS[@]} ))
          OPENING=${OPENINGS[$rand_idx]}

          rand_idx=$(( RANDOM % ${#ENDINGS[@]} ))
          ENDING=${ENDINGS[$rand_idx]}

          rand_idx=$(( RANDOM % ${#VARIANTS[@]} ))
          VARIANT=${VARIANTS[$rand_idx]}

          rand_idx=$(( RANDOM % ${#FIRST_PERSON[@]} ))
          FIRST_PERSON_INTENSITY=${FIRST_PERSON[$rand_idx]}

          ANCHOR_CHOICE=$(( RANDOM % 2 ))

          if [ $ANCHOR_CHOICE -eq 1 ]; then
            EXTERNAL_ANCHOR="有（根据近期校园事件或节气）"
          else
            EXTERNAL_ANCHOR="无"
          fi

          FORBIDDEN_TERMS="本质上,毋庸置疑,在当今社会"

          if [ -f state.json ]; then
            YESTERDAY_ARTICLE_TYPE=$(jq -r '.last_article_type // ""' state.json)
            YESTERDAY_TONE=$(jq -r '.last_tone // ""' state.json)
          else
            YESTERDAY_ARTICLE_TYPE=""
            YESTERDAY_TONE=""
          fi

          DAY=${{ steps.counter.outputs.day }}

          if [ "$DAY" -ne 1 ]; then
            if [ "$ARTICLE_TYPE" = "$YESTERDAY_ARTICLE_TYPE" ]; then
              rand_idx=$(( RANDOM % ${#ARTICLE_TYPES[@]} ))
              ARTICLE_TYPE=${ARTICLE_TYPES[$rand_idx]}
            fi

            if [ "$TONE" = "$YESTERDAY_TONE" ]; then
              rand_idx=$(( RANDOM % ${#TONES[@]} ))
              TONE=${TONES[$rand_idx]}
            fi
          fi

          jq \
            --arg at "$ARTICLE_TYPE" \
            --arg tn "$TONE" \
            '. + {last_article_type: $at, last_tone: $tn}' \
            state.json > tmp.json && mv tmp.json state.json

          echo "article_type=$ARTICLE_TYPE" >> $GITHUB_OUTPUT
          echo "tone=$TONE" >> $GITHUB_OUTPUT
          echo "opening=$OPENING" >> $GITHUB_OUTPUT
          echo "ending=$ENDING" >> $GITHUB_OUTPUT
          echo "variant=$VARIANT" >> $GITHUB_OUTPUT
          echo "first_person=$FIRST_PERSON_INTENSITY" >> $GITHUB_OUTPUT
          echo "external_anchor=$EXTERNAL_ANCHOR" >> $GITHUB_OUTPUT
          echo "forbidden_terms=$FORBIDDEN_TERMS" >> $GITHUB_OUTPUT

      - name: Read tomorrow's topic from schedule
        id: next_schedule
        run: |
          DAY=${{ steps.counter.outputs.day }}
          NEXT_DAY=$((DAY + 1))

          if [ $NEXT_DAY -le 365 ]; then
            NEXT_TOPIC=$(jq -r ".\"$NEXT_DAY\".topic" schedule.json)
            NEXT_SUBTOPIC=$(jq -r ".\"$NEXT_DAY\".subtopic" schedule.json)
          else
            NEXT_TOPIC=""
            NEXT_SUBTOPIC=""
          fi

          echo "next_topic=$NEXT_TOPIC" >> $GITHUB_OUTPUT
          echo "next_subtopic=$NEXT_SUBTOPIC" >> $GITHUB_OUTPUT

      - name: Generate markdown content
        env:
          API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          TODAY=$(TZ='Asia/Shanghai' date '+%Y年%m月%d日')

          PROMPT_MAIN=$(cat prompt.txt)
          PROMPT_EXAMPLES=$(cat examples.txt 2>/dev/null || echo "")

          PROMPT="$PROMPT_MAIN

          ---

          # 示例（外部文件）
          $PROMPT_EXAMPLES"

          PROMPT=$(echo "$PROMPT" | sed "s|{{TODAY}}|$TODAY|g")
          PROMPT=$(echo "$PROMPT" | sed "s|{{PREVIOUS_FORECAST}}|${{ steps.forecast.outputs.forecast }}|g")
          PROMPT=$(echo "$PROMPT" | sed "s|{{TOPIC}}|${{ steps.schedule.outputs.topic }}|g")
          PROMPT=$(echo "$PROMPT" | sed "s|{{SUBTOPIC}}|${{ steps.schedule.outputs.subtopic }}|g")
          PROMPT=$(echo "$PROMPT" | sed "s|{{BRIDGE}}|${{ steps.schedule.outputs.bridge }}|g")
          PROMPT=$(echo "$PROMPT" | sed "s|{{ARTICLE_TYPE}}|${{ steps.vars.outputs.article_type }}|g")
          PROMPT=$(echo "$PROMPT" | sed "s|{{TONE}}|${{ steps.vars.outputs.tone }}|g")
          PROMPT=$(echo "$PROMPT" | sed "s|{{OPENING_STYLE}}|${{ steps.vars.outputs.opening }}|g")
          PROMPT=$(echo "$PROMPT" | sed "s|{{ENDING_STYLE}}|${{ steps.vars.outputs.ending }}|g")
          PROMPT=$(echo "$PROMPT" | sed "s|{{STRUCTURE_VARIANT}}|${{ steps.vars.outputs.variant }}|g")
          PROMPT=$(echo "$PROMPT" | sed "s|{{EXTERNAL_ANCHOR}}|${{ steps.vars.outputs.external_anchor }}|g")
          PROMPT=$(echo "$PROMPT" | sed "s|{{FIRST_PERSON_INTENSITY}}|${{ steps.vars.outputs.first_person }}|g")
          PROMPT=$(echo "$PROMPT" | sed "s|{{FORBIDDEN_TERMS}}|${{ steps.vars.outputs.forbidden_terms }}|g")
          PROMPT=$(echo "$PROMPT" | sed "s|{{NEXT_TOPIC}}|${{ steps.next_schedule.outputs.next_topic }}|g")
          PROMPT=$(echo "$PROMPT" | sed "s|{{NEXT_SUBTOPIC}}|${{ steps.next_schedule.outputs.next_subtopic }}|g")

          JSON=$(jq -n --arg p "$PROMPT" '
          {
            model: "deepseek-chat",
            messages: [
              {
                role: "user",
                content: $p
              }
            ],
            temperature: 0.95,
            max_tokens: 4000
          }')

          RESPONSE=$(curl -s https://api.deepseek.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $API_KEY" \
            -d "$JSON")

          echo "$RESPONSE"

          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          if [ -z "$CONTENT" ]; then
            echo "DeepSeek API failed"
            exit 1
          fi

          echo "$CONTENT" > report.md

      - name: Get Feishu Access Token
        id: token
        env:
          APP_ID: ${{ secrets.FEISHU_APP_ID }}
          APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: |
          RESPONSE=$(curl -s -X POST \
            https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal \
            -H "Content-Type: application/json" \
            -d "{\"app_id\":\"$APP_ID\",\"app_secret\":\"$APP_SECRET\"}")

          TOKEN=$(echo "$RESPONSE" | jq -r '.tenant_access_token')

          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Upload markdown file
        id: upload
        env:
          TOKEN: ${{ steps.token.outputs.token }}
        run: |
          RESPONSE=$(curl -s -X POST \
            https://open.feishu.cn/open-apis/drive/v1/files/upload_all \
            -H "Authorization: Bearer $TOKEN" \
            -F "file_name=report.md" \
            -F "parent_type=explorer" \
            -F "size=$(wc -c < report.md)" \
            -F "file=@report.md")

          FILE_TOKEN=$(echo "$RESPONSE" | jq -r '.data.file_token')

          echo "filetoken=$FILE_TOKEN" >> $GITHUB_OUTPUT

      - name: Send file link to Feishu
        env:
          WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FILE_TOKEN: ${{ steps.upload.outputs.filetoken }}
          DAY: ${{ steps.counter.outputs.day }}
        run: |
          LINK="https://www.feishu.cn/file/${FILE_TOKEN}"

          PAYLOAD=$(jq -n \
            --arg text "【认知】📚 Day ${DAY}\n\nMarkdown 文件已生成：\n${LINK}" \
            '{msg_type:"text",content:{text:$text}}')

          curl -s -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
